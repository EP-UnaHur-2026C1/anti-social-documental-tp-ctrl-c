services:
  database:
    image: mongo:latest
    container_name: antisocial-db
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  
  redis:
    image: redis:latest
    container_name: antisocial-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  api:
    build: .
    container_name: antisocial-api
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - database
      - redis
    environment:
      PORT: ${PORT}
      MONGO_URI: mongodb://root:example@database:27017/anti-social?authSource=admin
      COMMENT_VISIBLE_MONTHS: 6
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/src
      - /src/node_modules

  cliente:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8081:8081"
    depends_on:
      - database
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@database:27017/
      ME_CONFIG_BASICAUTH: false
  
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redis_insight-data:/db
  

volumes:
  redis_insight-data:


